<!DOCTYPE html>
<html>

<head>
  <!-- Basic -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- Mobile Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <!-- Site Metas -->
  <link rel="icon" href="../../static/styles/images/favicon.png" type="image/gif" />
  <meta name="keywords" content="" />
  <meta name="description" content="" />
  <meta name="author" content="" />

  <title>Home</title>

  <!-- bootstrap core css -->
  <link rel="stylesheet" type="text/css" href="../../static/styles/bootstrap.css" />
  <!-- font awesome style -->
  <link href="../../static/styles/font-awesome.min.css" rel="stylesheet" />

  <!-- Custom styles for this template -->
  <link href="../../static/styles/style.css" rel="stylesheet" />
  <!-- responsive style -->
  <link href="../../static/styles/responsive.css" rel="stylesheet" />

</head>
<body>

    <div class="hero_area">
      <!-- header section strats -->
      <header class="header_section">
        <div class="container-fluid">
          <nav class="navbar navbar-expand-lg custom_nav-container ">
            <a class="navbar-brand" href="index.html">
              <span>
                eBook Club
              </span>
            </a>
  
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
              <span class=""> </span>
            </button>
  
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav">
                <li class="nav-item">
                  <a class="nav-link" href="{{ url_for('app_views.about')}}"> About</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{{ url_for('app_views.category')}}">Categories</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{{ url_for('app_views.post_review')}}"> Reviews </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="contact.html">Contact Us</a>
                </li>
              </ul>
            </div>
          </nav>
        </div>
      </header>
      <!-- end header section -->
      <!-- books section-->
      <section class="catagory_section layout_padding">
        <div class="catagory_container">
          <div class="container ">
            <div class="heading_container heading_center">
              <h2>
                <strong>Books</strong>
              </h2>
              <p>Lets explore through literature!</p>
            </div>
            <div class="row">
                <div class="col-sm-6 col-md-4 ">
                  <div class="box ">
                    <div class="img-box">
                      <img src="../../static/styles/images/cat1.png" alt="">
                    </div>
                    <div class="detail-box">
                        {% for book in books %}
                        <a href="{{ url_for('app_views.home', book_id=book.id) }}"><strong>{{ book.title }}</strong></a>
                        {% endfor %}
                    </div>
                    </div>
                </div>
            </div>
      <!-- info section -->
  
   

<!-- end info section -->
  <!-- footer section -->
  <footer class="footer_section">
    <div class="container">
      <p>
        &copy; <span id="displayYear"></span>  EBOOKCLUB All Rights Reserved By
      </p>
    </div>
  </footer>
  <!-- footer section -->

  <!-- jQery -->
  <script src="../../static/styles/jquery-3.4.1.min.js"></script>
  <!-- bootstrap js -->
  <script src="../../static/styles/bootstrap.js"></script>
  <!-- custom js -->
  <script src="../../static/styles/custom.js"></script>
  

</body>

</html>
